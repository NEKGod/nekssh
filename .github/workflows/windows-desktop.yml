name: Build Windows Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: desktop/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: Test
        run: go test ./...

      - name: Build Windows installer
        run: wails build -clean -platform windows/amd64 -nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NekSSH-windows-x64
          path: |
            desktop/build/bin/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/build/bin/*.exe
          generate_release_notes: true
