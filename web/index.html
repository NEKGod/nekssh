<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NekSSH</title><link rel="stylesheet" href="/vendor/xterm.css"><link rel="stylesheet" href="/style.css"><link rel="stylesheet" href="/overrides.css"><link rel="stylesheet" href="/bottom-layout.css"></head>
<body><div id="errorToast" hidden></div><div id="contextMenu" hidden><button data-action="open">打开目录</button><button data-action="download">下载</button></div><aside><div class="brand">NekSSH</div><button id="newHost" class="primary">＋ 新建连接</button><div id="hosts"></div><div class="hint">连接信息保存在此浏览器中<br>密码和私钥不会保存</div></aside>
<main><header><div id="tabs"></div><div class="connection-tools"><button id="filesButton" hidden>文件</button><button id="reconnect" hidden>↻ 重连</button><span id="status">● 就绪</span></div></header><div id="welcome"><h1>你的 SSH 工作台</h1><p>添加一台主机，打开安全的远程终端。</p><button id="welcomeNew" class="primary">添加第一台主机</button></div><div id="workspace"><div id="terminals"></div><section id="filePanel" hidden><div class="file-toolbar"><button id="fileUp">↑ 上级</button><button id="fileRefresh">刷新</button><label class="upload-button">上传<input id="fileUpload" type="file" hidden></label></div><div id="filePath">.</div><div id="fileList"></div><div class="file-limit">单个文件最大 10 MB</div></section></div></main>
<dialog id="modal"><form id="form"><h2 id="formTitle">连接到服务器</h2><label>名称<input name="name" placeholder="生产服务器" required></label><div class="row"><label>主机<input name="host" placeholder="192.168.1.10" required></label><label class="port">端口<input name="port" type="number" value="22" min="1" max="65535" required></label></div><label>用户名<input name="username" placeholder="root" required></label><label>密码<input name="password" type="password" autocomplete="current-password" placeholder="每次连接时输入"></label><label>私钥（可替代密码）<textarea name="privateKey" rows="5" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"></textarea></label><label>私钥口令<input name="passphrase" type="password"></label><div class="actions"><button type="button" id="cancel">取消</button><button class="primary" id="connectButton" type="submit">连接</button></div></form></dialog>
<script src="/vendor/xterm.js"></script><script src="/vendor/addon-fit.js"></script><script src="/app.js"></script></body></html>
